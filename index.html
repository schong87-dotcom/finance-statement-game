<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#eef2ff" />
<title>재무제표 학습 게임</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232563eb'/%3E%3Crect x='20' y='58' width='14' height='26' rx='2' fill='white'/%3E%3Crect x='43' y='42' width='14' height='42' rx='2' fill='white'/%3E%3Crect x='66' y='22' width='14' height='62' rx='2' fill='white'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  html, body { font-family: 'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  /* 커스텀 드래그 상태 — GPU 합성 레이어로 올려 즉시 반응 */
  .drag-source { opacity: 0.25 !important; }
  .drag-ghost-el {
    position: fixed;
    left: 0;
    top: 0;
    pointer-events: none;
    z-index: 60;
    will-change: transform;
    transform: translate3d(0, 0, 0);
    backface-visibility: hidden;
    box-shadow: 0 14px 32px -8px rgba(37,99,235,0.35), 0 6px 10px -4px rgba(0,0,0,0.12);
    opacity: 0.96;
    cursor: grabbing;
    transition: none !important;
  }
  body.dragging { cursor: grabbing !important; }
  body.dragging, body.dragging * {
    user-select: none !important;
    -webkit-user-select: none !important;
    -webkit-touch-callout: none !important;
  }
  .slot-hover { border-color: #2563eb !important; background: #dbeafe !important; box-shadow: inset 0 0 0 2px #93c5fd; }
  .leftzone-hover { border-color: #2563eb !important; background: #dbeafe !important; }
  .item-selected { box-shadow: 0 0 0 3px #2563eb, 0 6px 12px -4px rgba(37,99,235,0.4); transform: scale(0.98); }
  .slot-selected { box-shadow: 0 0 0 3px #8b5cf6, 0 6px 12px -4px rgba(139,92,246,0.4); }
  /* 드래그 항목·드롭 영역은 브라우저 기본 터치 제스처(스크롤/줌) 비활성 → 손가락 드래그 즉시 추적 */
  [data-left-id], [data-slot-item], [data-slot], #left-zone {
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .slot-correct { background: #ecfdf5 !important; border-color: #10b981 !important; }
  .slot-wrong { background: #fef2f2 !important; border-color: #ef4444 !important; }
  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: pop 0.25s ease-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.25s ease-in-out 2; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    top: -20px;
    border-radius: 2px;
    animation: linear forwards confetti-fall;
    pointer-events: none;
    z-index: 45;
  }
  @keyframes confetti-fall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* Pulse success on banner */
  @keyframes pulse-success {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  .pulse-success { animation: pulse-success 0.9s ease-in-out 2; }

  /* Sparkle bursts around banner */
  @keyframes sparkle {
    0%   { opacity: 0; transform: scale(0.6) translateY(0); }
    50%  { opacity: 1; transform: scale(1) translateY(-6px); }
    100% { opacity: 0; transform: scale(0.4) translateY(-16px); }
  }
  .sparkle { animation: sparkle 1.2s ease-out forwards; }

  /* Number count-up feel */
  @keyframes count-pop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .count-pop { animation: count-pop 0.55s cubic-bezier(.2,1.2,.4,1) both; }
  .bg-app {
    background:
      radial-gradient(circle at 0% 0%, #dbeafe 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, #ede9fe 0%, transparent 40%),
      linear-gradient(135deg, #eff6ff, #eef2ff 40%, #f5f3ff);
  }
  input:focus { outline: none; }
  /* prevent text selection during drag on touch */
  .dragging * { user-select: none !important; -webkit-user-select: none !important; }
</style>
</head>
<body class="bg-app min-h-screen text-gray-900 antialiased">
  <div id="root"></div>

  <!-- Toast container -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 pointer-events-none"></div>

  <!-- Modal container -->
  <div id="modal-root"></div>

  <script src="./js/data.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/game.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
